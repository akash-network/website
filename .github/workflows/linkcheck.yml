name: Link Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  linkcheck:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npx astro build --site "http://localhost:4321"

      # Extract URLs from the sitemap generated in dist/ (no server needed).
      - name: Collect URLs from sitemap
        id: collect
        run: |
          grep -ohE '<loc>[^<]+</loc>' dist/sitemap*.xml | sed 's|<loc>||;s|</loc>||' > urls.txt
          echo "count=$(wc -l < urls.txt)" >> "$GITHUB_OUTPUT"
          echo "url_list<<URLLIST_END" >> "$GITHUB_OUTPUT"
          tr '\n' ' ' < urls.txt >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "URLLIST_END" >> "$GITHUB_OUTPUT"
          echo "Collected $(wc -l < urls.txt) URLs"

      - name: Start preview server
        run: npx astro preview --port 4321 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:4321 > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Check links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --verbose --no-progress ${{ steps.collect.outputs.url_list }}

name: Link Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  linkcheck:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npx astro build --site "http://localhost:4321"

      # Extract URLs from the sitemap generated in dist/ (no server needed).
      - name: Collect URLs from sitemap
        id: collect
        run: |
          grep -ohE '<loc>[^<]+</loc>' dist/sitemap*.xml | sed 's|<loc>||;s|</loc>||' > urls.txt
          echo "count=$(wc -l < urls.txt)" >> "$GITHUB_OUTPUT"
          echo "Collected $(wc -l < urls.txt) URLs"

      - name: Start preview server
        run: npx astro preview --port 4321 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:4321 > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      # Only check links to our origin (localhost:4321); exclude external links so we don't fail on 404/509 from other sites.
      # (--offline blocks all HTTP requests and marks everything EXCLUDED; use --include instead so we actually verify internal links.)
      - name: Install lychee
        run: sudo snap install lychee

      - name: Check links
        run: cat urls.txt | lychee - --cache --verbose --no-progress --exclude '.*' --include 'http://localhost:4321'

  # Check links in source Markdown/HTML (no build). Runs in parallel with linkcheck.
  linkcheck-source:
    name: Link Check (source files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          format: "markdown"
          args: ". --verbose"

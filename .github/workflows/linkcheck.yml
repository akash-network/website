name: Link Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  linkcheck:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npx astro build --site "http://localhost:4321"

      # Extract URLs from the sitemap generated in dist/ (no server needed).
      - name: Collect URLs from sitemap
        id: collect
        run: |
          grep -ohE '<loc>[^<]+</loc>' dist/sitemap*.xml | sed 's|<loc>||;s|</loc>||' > urls.txt
          echo "count=$(wc -l < urls.txt)" >> "$GITHUB_OUTPUT"
          echo "Collected $(wc -l < urls.txt) URLs"

      - name: Start preview server
        run: npx astro preview --port 4321 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:4321 > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      # Install lychee and run via stdin so URLs with "&" aren't interpreted by the shell (action's args break on &).
      # --offline: only check links to our origin (localhost:4321), skip external links to avoid flaky 404/509/network errors.
      - name: Install lychee
        run: |
          ARCH=$(uname -m)
          curl -sSLo lychee.tar.gz "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.23.0/lychee-${ARCH}-unknown-linux-gnu.tar.gz"
          tar -xzf lychee.tar.gz
          mv lychee 2>/dev/null || mv lychee-*/lychee .
          chmod +x lychee
          echo "$(pwd)" >> "$GITHUB_PATH"

      - name: Check links
        run: cat urls.txt | lychee - --verbose --no-progress --offline
